{% extends 'base.html' %}
{% load static %}

{% block content %}

<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; background:var(--off-white); padding:2rem;">
    <div style="background:white; border-radius:var(--radius); box-shadow:var(--shadow-hover); padding:3rem; width:100%; max-width:460px;">
        
        <!-- ICON -->
        <div style="width:64px; height:64px; background:var(--light-gray); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; font-size:1.8rem;">
            &#128274;
        </div>

        <!-- TITLE -->
        <h2 style="text-align:center; margin-bottom:0.5rem;">Admin Login</h2>
        <p style="text-align:center; color:var(--text-light); font-size:0.95rem; margin-bottom:2rem;">Staff access only</p>

        <!-- ERROR -->
        {% if error %}
        <div style="background:#f8d7da; color:#721c24; padding:0.75rem 1rem; border-radius:var(--radius-sm); margin-bottom:1.5rem; font-size:0.9rem;">
            &#9888; {{ error }}
        </div>
        {% endif %}

        <!-- FORM -->
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required />
            </div>
            <button type="submit" class="form-submit" style="margin-top:0.5rem;">Sign In</button>
        </form>

        <!-- BACK LINK -->
        <p style="text-align:center; margin-top:1.5rem;">
            <a href="{% url 'home' %}" style="color:var(--text-light); font-size:0.9rem;">&#8592; Back to Home</a>
        </p>

    </div>
</div>

{% endblock %}
