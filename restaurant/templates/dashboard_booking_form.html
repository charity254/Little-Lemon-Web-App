{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="page-banner" style="text-align:left;">
    <h1>{{ title }}</h1>
    <p>Fill in the customer details to make a reservation</p>
</div>

<div style="padding:3rem 5%; max-width:700px;">
    <div class="book-form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" placeholder="John" required />
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" placeholder="Doe" required />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date *</label>
                    <input type="date" name="date" value="{{ form.date.value|default:'' }}" required />
                </div>
                <div class="form-group">
                    <label>Time *</label>
                    <input type="time" name="time" value="{{ form.time.value|default:'' }}" required />
                </div>
            </div>
            <div class="form-group">
                <label>Number of Guests *</label>
                <input type="number" name="guest_number" min="1" max="20" value="{{ form.guest_number.value|default:'' }}" placeholder="2" required />
            </div>
            <div class="form-group">
                <label>Special Requests (Optional)</label>
                <textarea name="special_requests" placeholder="Dietary restrictions, allergies, special occasions, etc.">{{ form.special_requests.value|default:'' }}</textarea>
            </div>
            <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button type="submit" class="form-submit">Save Reservation</button>
                <a href="{% url 'dashboard' %}" class="btn btn-yellow" style="flex:1; justify-content:center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
